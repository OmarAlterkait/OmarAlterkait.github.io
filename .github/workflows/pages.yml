name: Deploy site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments so two pushes never race; queue instead of cancel
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      # Stamp the commit into the page so the live site is verifiable
      - name: Stamp commit SHA into index.html
        run: |
          printf '\n<!-- deployed: %s -->\n' "$GITHUB_SHA" >> index.html

      - name: Cache-bust asset URLs with the commit SHA
        run: |
          sed -i "s/__BUILD__/${GITHUB_SHA:0:7}/g" index.html contact.html js/bg-drift.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait 60s before attempt 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait 180s before attempt 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 180

      - name: Deploy to GitHub Pages (attempt 3, final)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

  # Independently confirm the live site actually serves this commit
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Poll live site for this commit's stamp
        run: |
          for i in $(seq 1 30); do
            if curl -fsSL "https://omaralterkait.github.io/?v=$GITHUB_SHA" | grep -q "deployed: $GITHUB_SHA"; then
              echo "Verified: live site serves $GITHUB_SHA"
              exit 0
            fi
            echo "Attempt $i: not yet serving $GITHUB_SHA"
            sleep 20
          done
          echo "ERROR: live site never served $GITHUB_SHA within 10 minutes"
          exit 1
